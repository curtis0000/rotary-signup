  扶輪社活動報名板 — 取代 Line 接龍
  單一 HTML，使用 Firebase Firestore 作為共享後端，
  所有打開此頁面的人看到同一份名單。
-->

<style>
  :root{
    --azure:#17468f;
    --azure-bright:#1f5bb5;
    --gold:#f2a900;
    --gold-deep:#c8870b;
    --ink:#1a2230;
    --muted:#5b6675;
    --line:#e4e7ec;
    --bg:#f5f6f8;

    --good:#1a7f4b;
    --danger:#c0392b;
    --radius:14px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 6px 18px rgba(16,24,40,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:720px;margin:0 auto;padding:18px 16px 64px}

  /* ---- header ---- */
  header.top{
    background:linear-gradient(135deg,var(--azure) 0%,var(--azure-bright) 100%);
    color:#fff;border-radius:var(--radius);padding:20px 18px;box-shadow:var(--shadow);
    position:relative;overflow:hidden;
  }
  header.top .cog{
    position:absolute;right:-26px;top:-26px;width:130px;height:130px;opacity:.16;
  }
  header.top h1{margin:0;font-size:21px;font-weight:800;letter-spacing:.3px}
  header.top .sub{margin-top:4px;font-size:13px;opacity:.85}
  .statusbar{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12.5px;opacity:.92}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 0 rgba(242,169,0,.7)}
  .dot.live{animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(242,169,0,.6)}70%{box-shadow:0 0 0 7px rgba(242,169,0,0)}100%{box-shadow:0 0 0 0 rgba(242,169,0,0)}}
  .statusbar button{
    margin-left:auto;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.25);
    border-radius:8px;padding:5px 10px;font-size:12.5px;cursor:pointer;font-weight:600;

  /* ---- toolbar ---- */

  .switch::after{content:"";position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}

  /* ---- session card ---- */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-top:14px;overflow:hidden;

  .card.past{opacity:.66}
  .chead{padding:15px 16px 12px;border-bottom:1px solid var(--line)}
  .chead .when{
    display:inline-block;font-size:12px;font-weight:700;color:var(--azure);

  /* ---- add signup form ---- */
  .cfoot{padding:11px 14px 14px;background:#fafbfc;border-top:1px solid var(--line)}
  .addbtn{
    width:100%;border:1.5px dashed #c3c9d2;background:#fff;color:var(--azure);

  .form .row2{display:flex;gap:9px}

  .form .formacts{display:flex;gap:9px;margin-top:2px}
  .btn{border:0;border-radius:9px;padding:11px 14px;font-size:14.5px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--azure);color:#fff;flex:1}

  /* ---- add session (admin) ---- */
  .newsession{
    margin-top:14px;border:1.5px dashed #c3c9d2;border-radius:var(--radius);
    background:#fff;padding:14px;
  }
  .newsession h3{margin:0 0 10px;font-size:15px;color:var(--azure)}
  .newsession .grid{display:flex;flex-direction:column;gap:9px}
  .newsession .row2{display:flex;gap:9px}
  .newsession input,.newsession textarea{
    width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:15px;font-family:inherit;

  .newsession select,.editsession select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 8px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  .newsession select:focus,.editsession select:focus{outline:none;border-color:var(--azure-bright);box-shadow:0 0 0 3px rgba(31,91,181,.12)}

  .adminbar{display:flex;gap:8px;margin-bottom:11px}
  .abtn{font-size:12.5px;font-weight:700;border-radius:8px;padding:6px 11px;cursor:pointer;border:1px solid var(--line);background:#fff}
  .abtn:active{transform:scale(.97)}
  .abtn.edit{color:var(--azure);border-color:#cfe0f6;background:#eaf1fb}
  .abtn.del{color:var(--danger);border-color:#f3c9c5;background:#fdedec}
  .editsession{padding:15px 16px;display:flex;flex-direction:column;gap:9px}
  .editsession h3{margin:0 0 2px;font-size:15px;color:var(--azure)}
  .editsession .row2{display:flex;gap:9px}
  .editsession input,.editsession textarea{
    width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 11px;font-size:15px;font-family:inherit;
  }
  .editsession input:focus,.editsession textarea:focus{outline:none;border-color:var(--azure-bright);box-shadow:0 0 0 3px rgba(31,91,181,.12)}
  .editsession textarea{resize:vertical;min-height:40px}

  .footnote{margin-top:22px;font-size:12px;color:#9aa3b0;text-align:center;line-height:1.6}
  .empty-board{
    text-align:center;color:var(--muted);padding:40px 20px;font-size:14.5px;
    background:#fff;border:1px dashed var(--line);border-radius:var(--radius);margin-top:14px;

  /* ---- export modal ---- */
  .modal{display:none;position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:50;
    align-items:center;justify-content:center;padding:16px}
  .modal.open{display:flex}
  .modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:560px;
    max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal-head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
  .modal-head strong{font-size:16px}
  .modal-head .x{margin-left:auto;border:0;background:transparent;font-size:16px;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:7px}
  .modal-head .x:hover{background:#f0f1f3}
  .modal-sub{padding:10px 16px 0;font-size:12.5px;color:var(--muted)}
  #exportText{margin:10px 16px;border:1px solid var(--line);border-radius:9px;padding:10px;

    min-height:200px;resize:vertical;background:#fafbfc;color:var(--ink);white-space:pre}
  .modal-acts{display:flex;gap:9px;padding:0 16px 16px}
  .modal-acts .btn{flex:1}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocsFromServer } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0K56cGlcsQpy6XERoy57yE4aFGoLrPiU",
  authDomain: "rotary-signup-f8ac9.firebaseapp.com",
  projectId: "rotary-signup-f8ac9",
  storageBucket: "rotary-signup-f8ac9.firebasestorage.app",
  messagingSenderId: "1098679765616",
  appId: "1:1098679765616:web:e70ea3d580dcecc535c2b5"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ============ 共享儲存封裝（Firestore,容錯） ============
   資料存在 Firestore 的 store 集合,每筆文件 id = key,欄位 value = 內容陣列。 */
async function sget(key, fallback){
  try{ const snap = await getDoc(doc(db,'store',key)); return snap.exists() ? snap.data().value : fallback; }
  catch(e){ return fallback; }
}
async function sset(key, val){
  try{ await setDoc(doc(db,'store',key), {value: val}); return true; }
  catch(e){ flashStatus('儲存失敗,請再試一次'); return false; }
}
async function sdel(key){ try{ await deleteDoc(doc(db,'store',key)); }catch(e){} }

/* 個人標記（只存本機,只有自己看得到自己報的名） */
function getMine(){ try{ return JSON.parse(localStorage.getItem('rotary_mine')||'[]'); }catch(e){ return []; } }
function addMine(id){ const m=getMine(); if(!m.includes(id)){ m.push(id); try{ localStorage.setItem('rotary_mine', JSON.stringify(m)); }catch(e){} } }
let MINE = [];

/* ============ 資料模型 ============
   activities (shared): [{id,title,date,time,location,capacity,note}]
   signups:<actId> (shared): [{id,name,party,note,ts}]
   —— 每個場次的報名各自一把 key，避免不同場次互相覆蓋。
*/
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

let adminMode = false;
let filterMode = 'upcoming';
let openForm = null;     // 哪個場次的報名表單開著
let editing = null;      // {actId, signupId} 正在編輯報名
let editingAct = null;   // 正在編輯的場次 id
let lastHash = '';
let busy = false;        // 動作進行中,擋掉重複觸發(避免連點送出多筆)
let expanded = new Set();// 使用者手動展開的場次 id(名單很長時預設收合)
const COLLAPSE_THRESHOLD = 8;  // 名單超過此人數才提供收合
const COLLAPSE_PREVIEW = 3;    // 收合時預覽前幾位

/* 本地快取:畫面一律從快取繪製(瞬間反應),只有真正讀寫雲端時才連線 */
let ACTS = [];           // 場次快取
let SIGNUPS = {};        // 各場次報名快取 {actId: [...]}

function loadActivities(){ return ACTS; }
function loadSignups(actId){ return SIGNUPS[actId] || []; }

/* 從雲端重抓最新資料到快取,再重繪(背景同步 / 手動刷新用)。
   一趟查詢抓齊 store 全部文件(場次＋所有名單),避免逐場往返在行動網路上中途斷線。
   失敗時保留原本快取(寧可顯示舊名單,也不要錯誤地歸零),回傳是否成功。 */
async function refresh(){
  let snap;
  // 一定要用 getDocsFromServer:一般 getDocs 在斷線時會默默回傳空的本機快取,
  // 畫面就會錯誤地歸零;強制讀伺服器,連不上就丟錯誤,走「保留舊資料」路徑。
  try{ snap = await getDocsFromServer(collection(db,'store')); }
  catch(e){ statusIdle='⚠ 未能更新,顯示的可能是舊名單'; flashStatus(statusIdle); return false; }
  const acts = [];
  const map = {};
  snap.forEach(d=>{
    if(d.id==='activities') acts.push(...(d.data().value||[]));
    else if(d.id.startsWith('signups:')) map[d.id.slice('signups:'.length)] = d.data().value||[];
  });
  ACTS = acts;
  SIGNUPS = map;
  statusIdle='名單已同步';
  await render(false);
  return true;
}

/* ============ 操作 ============ */
async function addSignup(actId, name, party, note){
  if(!name.trim() || busy) return;
  if(isClosed(ACTS.find(x=>x.id===actId))){ flashStatus('報名已截止'); openForm=null; await render(true); return; }
  busy = true;
  try{
    const list = await sget('signups:'+actId, []);   // 寫入前重抓雲端最新,降低覆蓋
    const id = uid();
    list.push({id, name:name.trim(), party:normParty(party), note:(note||'').trim(), ts:Date.now()});
    if(await sset('signups:'+actId, list)){ SIGNUPS[actId]=list; addMine(id); MINE=getMine(); }
    openForm = null; editing = null;
    await render(true);
  } finally { busy = false; }
}
async function updateSignup(actId, signupId, name, party, note){
  if(busy) return; busy = true;
  try{
    const list = await sget('signups:'+actId, []);
    const it = list.find(x=>x.id===signupId); if(!it) return;
    it.name=name.trim(); it.party=normParty(party); it.note=(note||'').trim();
    if(await sset('signups:'+actId, list)) SIGNUPS[actId]=list;
    editing = null; openForm = null;
    await render(true);
  } finally { busy = false; }
}
async function removeSignup(actId, signupId, label){
  if(busy) return;
  if(!confirm('確定刪除「'+label+'」的報名?')) return;
  busy = true;
  try{
    const list = (await sget('signups:'+actId, [])).filter(x=>x.id!==signupId);
    if(await sset('signups:'+actId, list)) SIGNUPS[actId]=list;
    await render(true);
  } finally { busy = false; }
}
async function addActivity(a){
  if(busy) return; busy = true;
  try{
    const list = await sget('activities', []);
    list.push({id:uid(), title:a.title, date:a.date, time:a.time, location:a.location, capacity:parseInt(a.capacity)||0, note:a.note, deadline:a.deadline||'', signupState:''});
    if(await sset('activities', list)) ACTS=list;
    await render(true);
  } finally { busy = false; }
}
async function deleteActivity(actId, title){
  if(busy) return;
  if(!confirm('刪除整個場次「'+title+'」?\n該場次所有報名也會一併刪除。')) return;
  busy = true;
  try{
    const list = (await sget('activities', [])).filter(x=>x.id!==actId);
    if(await sset('activities', list)) ACTS=list;
    await sdel('signups:'+actId); delete SIGNUPS[actId];
    await render(true);
  } finally { busy = false; }
}
async function updateActivity(actId, data){
  if(busy) return; busy = true;
  try{
    const list = await sget('activities', []);
    const it = list.find(x=>x.id===actId); if(!it) return;
    it.title = (data.title||'').trim() || '未命名活動';
    it.date = data.date; it.time = data.time;
    it.location = (data.location||'').trim();
    it.capacity = parseInt(data.capacity)||0;
    it.note = (data.note||'').trim();
    it.deadline = data.deadline||'';
    if(await sset('activities', list)) ACTS=list;
    editingAct = null;
    await render(true);
  } finally { busy = false; }
}
/* 管理者手動關閉/開放報名（覆寫截止時間） */
async function toggleClose(actId, next){
  if(busy) return; busy = true;
  try{
    const list = await sget('activities', []);
    const it = list.find(x=>x.id===actId); if(!it) return;
    it.signupState = next;   // 'open' | 'closed'
    if(await sset('activities', list)) ACTS=list;
    await render(true);
  } finally { busy = false; }
}

/* ============ 匯出備份 ============ */
async function exportBackup(){
  const meta = document.getElementById('exportMeta');
  const ta = document.getElementById('exportText');
  meta.textContent = '讀取中…';
  ta.value = '';
  openModal();
  try{
    const activities = await loadActivities();
    const signups = {};
    let total = 0;
    // 逐場次抓報名
    const keys = activities.map(a=>'signups:'+a.id);
    for(const key of keys){
      const actId = key.replace(/^signups:/,'');
      const list = await loadSignups(actId);
      signups[actId] = list;
      total += list.length;
    }
    const backup = { schema:'rotary-signup', version:1, exportedAt:new Date().toISOString(), activities, signups };
    ta.value = JSON.stringify(backup, null, 2);
    meta.textContent = '場次 ' + activities.length + ' 筆 · 報名 ' + total + ' 筆 · ' + new Date().toLocaleString();
    ta.focus(); ta.select();
  }catch(e){
    meta.textContent = '匯出失敗,請重試。';
  }
}

function closeModal(){ document.getElementById('exportModal').classList.remove('open'); }
document.getElementById('exportClose').onclick = closeModal;
document.getElementById('exportModal').onclick = (e)=>{ if(e.target.id==='exportModal') closeModal(); };
document.getElementById('exportCopy').onclick = async function(){

document.getElementById('exportDownload').onclick = function(){

/* ============ 工具 ============ */
function totalHeads(signups){ return signups.reduce((s,x)=>s+(x.party??1),0); }
function normParty(v){ v=parseInt(v); return (isNaN(v)||v<0)?1:v; }  // 允許 0（不參加，不佔人數）；空白/無效視為 1
function isPast(a){
  if(!a.date) return false;
  const d = new Date(a.date + 'T' + (a.time||'23:59'));
  return d.getTime() < Date.now() - 3*3600*1000; // 過了 3 小時才算過去
}
function fmtDate(a){
  if(!a.date) return '日期待定';
  const d = new Date(a.date+'T00:00');
  const wd = ['日','一','二','三','四','五','六'][d.getDay()];
  const md = (d.getMonth()+1)+'/'+d.getDate();
  return md + '（' + wd + '）' + (a.time? ' '+a.time : '');
}
/* 報名是否已截止：手動覆寫優先(closed/open)，否則看截止時間到了沒 */
function isClosed(a){
  if(!a) return false;
  if(a.signupState==='closed') return true;
  if(a.signupState==='open') return false;
  if(a.deadline){ const t=new Date(a.deadline).getTime(); if(!isNaN(t) && Date.now()>t) return true; }
  return false;
}
function fmtDeadline(dl){
  const d=new Date(dl); if(isNaN(d)) return '';
  const wd=['日','一','二','三','四','五','六'][d.getDay()];
  const p=n=>String(n).padStart(2,'0');
  return (d.getMonth()+1)+'/'+d.getDate()+'（'+wd+'）'+p(d.getHours())+':'+p(d.getMinutes());
}
/* 時/分下拉選單選項；第一個是提示用的空值(label) */
function numOpts(from,to,step,sel,label){
  let s='<option value="">'+label+'</option>';
  for(let v=from; v<=to; v+=step){
    s+='<option value="'+v+'"'+(sel!=='' && +sel===v?' selected':'')+'>'+String(v).padStart(2,'0')+'</option>';
  }
  return s;
}
/* 把字串片段轉成下拉預選值：空或未定義＝未選 */
function toSel(x){ return (x===undefined||x==='')?'':+x; }
/* 由 時/分 下拉組回 "HH:mm"；都沒選＝空字串 */
function mkTime(h,mi){
  if(h==='' && mi==='') return '';
  const p=n=>String(n).padStart(2,'0');
  return p(h===''?0:+h)+':'+p(mi===''?0:+mi);
}
/* 由 日期＋時＋分 組回截止字串；沒選日期＝不設截止，時分沒選＝當天 23:50 */
function mkDeadline(date,h,mi){
  if(!date) return '';
  const p=n=>String(n).padStart(2,'0');
  let hh,mm;
  if(h==='' && mi===''){ hh=23; mm=50; }
  else { hh=h===''?0:+h; mm=mi===''?0:+mi; }
  return date+'T'+p(hh)+':'+p(mm);
}

let statusTimer=null;
let statusIdle='名單已同步';   // 閒置時顯示的同步狀態(更新失敗期間會換成警示文字)
function flashStatus(msg){
  const el=document.getElementById('statusText'); if(!el)return;
  el.textContent=msg; clearTimeout(statusTimer);
  statusTimer=setTimeout(()=>{el.textContent=statusIdle;},2200);
}

async function render(force){
  // 若有人正在打字 / 表單開著，避免覆蓋（除非是自己操作觸發的 force）
  const ae = document.activeElement;
  const typing = ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');
  if(!force && (typing || openForm || editing || editingAct)) return;

  const acts = await loadActivities();
  // 一次抓齊各場次名單
  const signupsMap = {};
  for(const a of acts){ signupsMap[a.id] = await loadSignups(a.id); }

  const hash = JSON.stringify({acts, signupsMap, adminMode, filterMode, openForm, editing, editingAct, MINE, expanded:[...expanded], closed:acts.map(isClosed)});
  if(!force && hash===lastHash) return;
  lastHash = hash;

  acts.sort((x,y)=> (x.date||'9999').localeCompare(y.date||'9999') || (x.time||'').localeCompare(y.time||''));
  let shown = acts;
  if(filterMode==='upcoming') shown = acts.filter(a=>!isPast(a));

  const board = document.getElementById('board');
  let html = '';

  if(shown.length===0){
    html += '<div class="empty-board">'
      + (acts.length===0 ? '目前還沒有任何場次。<br>打開上方「管理場次」即可新增。'
                         : '沒有即將舉行的場次。<br>切到「全部場次」可查看過去活動。')
      + '</div>';
  }

  for(const a of shown){
    const su = signupsMap[a.id] || [];
    const heads = totalHeads(su);
    const cap = a.capacity||0;
    const full = cap>0 && heads>=cap;
    const pct = cap>0 ? Math.min(100, Math.round(heads/cap*100)) : 0;
    const past = isPast(a);
    const closed = isClosed(a);

    html += '<div class="card'+(past?' past':'')+'" data-act="'+a.id+'">';

    // 編輯場次表單（管理模式）
    if(adminMode && editingAct===a.id){
      const et=(a.time||'').split(':');                 // 活動時間 [時,分]
      const dl=(a.deadline||'').split('T'); const dt=(dl[1]||'').split(':');  // 截止 日期 / [時,分]
      html += '<div class="editsession" data-editact="'+a.id+'">'
        + '<h3>編輯場次</h3>'
        + '<input class="es_title" value="'+esc(a.title||'')+'" placeholder="活動名稱" maxlength="40">'
        + '<div class="row2"><input class="es_date" type="date" value="'+esc(a.date||'')+'" style="flex:1.4"><select class="es_h" style="flex:1">'+numOpts(0,23,1,toSel(et[0]),'時')+'</select><select class="es_mi" style="flex:1">'+numOpts(0,50,10,toSel(et[1]),'分')+'</select></div>'
        + '<input class="es_loc" value="'+esc(a.location||'')+'" placeholder="地點（選填）" maxlength="40">'
        + '<input class="es_cap" type="number" min="0" value="'+(a.capacity||0)+'" placeholder="名額上限（0 = 不限）">'
        + '<div style="font-size:12px;color:var(--muted);margin:2px 0 -4px 2px">報名截止時間（選填,到時自動關閉報名）</div>'
        + '<div class="row2"><input class="es_dl_date" type="date" value="'+esc(dl[0]||'')+'" style="flex:1.4"><select class="es_dl_h" style="flex:1">'+numOpts(0,23,1,toSel(dt[0]),'時')+'</select><select class="es_dl_mi" style="flex:1">'+numOpts(0,50,10,toSel(dt[1]),'分')+'</select></div>'
        + '<textarea class="es_note" placeholder="說明 / 備註（選填）" maxlength="200">'+esc(a.note||'')+'</textarea>'
        + '<div class="formacts"><button class="btn primary" data-save-act="'+a.id+'">儲存變更</button>'
        + '<button class="btn ghost" data-cancel-act="1">取消</button></div>'
        + '</div></div>';
      continue;
    }

    html += '<div class="chead">';
    if(adminMode){
      html += '<div class="adminbar">'
        + '<button class="abtn edit" data-edit-act="'+a.id+'">✎ 編輯場次</button>'
        + '<button class="abtn'+(closed?' edit':' del')+'" data-toggle-close="'+a.id+'">'+(closed?'🔓 開放報名':'🔒 關閉報名')+'</button>'
        + '<button class="abtn del" data-del-act="'+a.id+'">🗑 刪除</button>'
        + '</div>';
    }
    html += '<span class="when'+(past?' badge-past':'')+'">'+esc(fmtDate(a))+(past?' · 已結束':'')+'</span>';
    if(closed && !past) html += '<span class="closed-tag">🔒 報名已截止</span>';
    html += '<h2>'+esc(a.title||'未命名活動')+'</h2>';
    if(a.location) html += '<div class="meta"><span>📍 '+esc(a.location)+'</span></div>';
    if(a.deadline && !closed && !past){ const dl=fmtDeadline(a.deadline); if(dl) html += '<div class="meta"><span>⏳ 報名至 '+esc(dl)+'</span></div>'; }
    if(a.note) html += '<div class="note">'+esc(a.note)+'</div>';

    html += '<div class="capwrap"><div class="capline"><span>'+(cap>0?'報名人數':'已報名')+'</span>'
          + '<b>'+heads+(cap>0?(' / '+cap):'')+' 人</b></div>';
    if(cap>0) html += '<div class="capbar'+(full?' full':'')+'"><i style="width:'+pct+'%"></i></div>';
    html += '</div></div>';

    // 名單（人數多時預設收合,只露出前幾位）
    const collapsible = su.length > COLLAPSE_THRESHOLD;
    const editingHere = editing && editing.actId===a.id;   // 正在編輯此場次某筆,強制展開才看得到編輯框
    const collapsed = collapsible && !expanded.has(a.id) && !editingHere;
    html += '<ol class="list">';
    if(su.length===0){
      html += '<li class="empty">還沒有人報名,當第一個 👋</li>';
    } else {
      const showN = collapsed ? COLLAPSE_PREVIEW : su.length;
      su.forEach((s,i)=>{
        if(i>=showN) return;
        if(editing && editing.actId===a.id && editing.signupId===s.id){
          html += '<li><span class="idx">'+(i+1)+'</span><div class="form open" style="flex:1" data-editform="'+a.id+'|'+s.id+'">'
            + '<div class="row2"><input class="name" value="'+esc(s.name)+'" maxlength="20">'
            + '<input class="party" type="number" min="0" value="'+(s.party??1)+'"></div>'
            + '<input class="enote" value="'+esc(s.note||'')+'" placeholder="備註（選填）" maxlength="40">'
            + '<div class="formacts"><button class="btn primary" data-save-edit>儲存</button>'
            + '<button class="btn ghost" data-cancel-edit>取消</button></div></div></li>';
        } else {
          html += '<li><span class="idx">'+(i+1)+'</span>';
          html += '<span class="nm">'+esc(s.name)+'</span>';
          if((s.party||1)>1) html += '<span class="plus">+'+(s.party||1)+'</span>';
          if(s.note) html += '<span class="rownote">'+esc(s.note)+'</span>';
          html += '<span class="acts"><button data-edit="'+a.id+'|'+s.id+'">改</button>'
                + '<button data-rm="'+a.id+'|'+s.id+'|'+esc(s.name)+'">刪</button></span></li>';
        }
      });
      if(collapsed){
        html += '<li class="togglerow"><button data-toggle-list="'+a.id+'">顯示其餘 '+(su.length-COLLAPSE_PREVIEW)+' 人 ▾</button></li>';
      } else if(collapsible && expanded.has(a.id)){
        html += '<li class="togglerow"><button data-toggle-list="'+a.id+'">收合名單 ▴</button></li>';
      }
    }
    html += '</ol>';

    // 報名表單
    const formOpen = openForm===a.id && !closed;
    html += '<div class="cfoot">';
    if(closed){
      html += '<button class="addbtn closed" disabled>🔒 報名已截止</button>';
    } else if(!formOpen){
      html += '<button class="addbtn" data-open="'+a.id+'">＋ 我要報名'+(full?'（已額滿,候補）':'')+'</button>';
    } else {
      html += '<div class="form open" data-addform="'+a.id+'">'
        + '<div class="field-label">姓名</div>'
        + '<div class="row2"><input class="name" placeholder="你的名字" maxlength="20" autofocus>'
        + '<input class="party" type="number" min="0" value="1" title="含本人共幾位；不參加填 0"></div>'
        + '<div class="field-label">同行人數含本人,例如帶眷屬填 2;不參加填 0(不佔人數)</div>'
        + '<input class="enote" placeholder="備註（選填,例:晚到 / 吃素）" maxlength="40">'
        + '<div class="formacts"><button class="btn primary" data-submit="'+a.id+'">送出報名</button>'
        + '<button class="btn ghost" data-cancel="'+a.id+'">取消</button></div></div>';
    }
    html += '</div></div>';
  }

  // 管理：新增場次
  if(adminMode){
    html += '<div class="newsession"><h3>＋ 新增場次</h3><div class="grid" id="newSessionForm">'
      + '<input id="ns_title" placeholder="活動名稱（例:8 月例會、淨灘活動）" maxlength="40">'
      + '<div class="row2"><input id="ns_date" type="date" style="flex:1.4"><select id="ns_h" style="flex:1">'+numOpts(0,23,1,'','時')+'</select><select id="ns_mi" style="flex:1">'+numOpts(0,50,10,'','分')+'</select></div>'
      + '<input id="ns_loc" placeholder="地點（選填）" maxlength="40">'
      + '<div class="row2"><input id="ns_cap" type="number" min="0" placeholder="名額上限（0 = 不限）"></div>'
      + '<div style="font-size:12px;color:var(--muted);margin:2px 0 -4px 2px">報名截止時間（選填,到時自動關閉報名）</div>'
      + '<div class="row2"><input id="ns_dl_date" type="date" style="flex:1.4"><select id="ns_dl_h" style="flex:1">'+numOpts(0,23,1,'','時')+'</select><select id="ns_dl_mi" style="flex:1">'+numOpts(0,50,10,'','分')+'</select></div>'
      + '<textarea id="ns_note" placeholder="說明 / 備註（選填）" maxlength="200"></textarea>'
      + '<button class="btn primary" id="ns_add">建立場次</button>'
      + '</div></div>';

    html += '<div class="newsession" style="margin-top:12px">'
      + '<h3 style="margin-bottom:6px">資料備份</h3>'
      + '<div style="font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.55">'
      + '搬到正式系統前,先按此匯出完整 JSON 備份。<br>提醒:取消發布會清空資料,務必「先匯出、再改版/取消發布」。</div>'
      + '<button class="btn ghost" id="exportBtn" style="width:100%;background:#eaf1fb;color:var(--azure)">⬇ 匯出備份（JSON）</button>'
      + '</div>';
  }

  board.innerHTML = html;
  bindEvents(board);
}

function bindEvents(board){
  board.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{openForm=b.dataset.open; editing=null; render(true);});
  board.querySelectorAll('[data-cancel]').forEach(b=>b.onclick=()=>{openForm=null; render(true);});
  board.querySelectorAll('[data-submit]').forEach(b=>b.onclick=()=>{
    if(busy) return;
    const f=board.querySelector('[data-addform="'+b.dataset.submit+'"]');
    b.disabled=true; b.textContent='送出中…';
    addSignup(b.dataset.submit, f.querySelector('.name').value, f.querySelector('.party').value, f.querySelector('.enote').value);
  });
  board.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{const [a,s]=b.dataset.edit.split('|'); editing={actId:a,signupId:s}; openForm=null; render(true);});
  board.querySelectorAll('[data-cancel-edit]').forEach(b=>b.onclick=()=>{editing=null; render(true);});
  board.querySelectorAll('[data-save-edit]').forEach(b=>b.onclick=()=>{
    if(busy) return;
    const wrap=b.closest('[data-editform]'); const [a,s]=wrap.dataset.editform.split('|');
    b.disabled=true; b.textContent='儲存中…';
    updateSignup(a,s, wrap.querySelector('.name').value, wrap.querySelector('.party').value, wrap.querySelector('.enote').value);
  });
  board.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{const [a,s,nm]=b.dataset.rm.split('|'); removeSignup(a,s,nm);});
  board.querySelectorAll('[data-toggle-list]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.toggleList;
    if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
    render(true);
  });
  board.querySelectorAll('[data-del-act]').forEach(b=>b.onclick=()=>{
    const card=b.closest('.card'); const t=card.querySelector('h2').textContent;
    deleteActivity(b.dataset.delAct, t);
  });
  board.querySelectorAll('[data-edit-act]').forEach(b=>b.onclick=()=>{editingAct=b.dataset.editAct; openForm=null; editing=null; render(true);});
  board.querySelectorAll('[data-toggle-close]').forEach(b=>b.onclick=()=>{
    if(busy) return;
    const id=b.dataset.toggleClose;
    toggleClose(id, isClosed(ACTS.find(x=>x.id===id)) ? 'open' : 'closed');
  });
  // 活動本身的原生日期框：選完自動收起彈窗
  board.querySelectorAll('input[type="date"]').forEach(d=>d.onchange=()=>{ try{ d.blur(); }catch(e){} });
  board.querySelectorAll('[data-cancel-act]').forEach(b=>b.onclick=()=>{editingAct=null; render(true);});
  board.querySelectorAll('[data-save-act]').forEach(b=>b.onclick=()=>{
    if(busy) return;
    const wrap=board.querySelector('[data-editact="'+b.dataset.saveAct+'"]');
    b.disabled=true; b.textContent='儲存中…';
    updateActivity(b.dataset.saveAct, {
      title: wrap.querySelector('.es_title').value,
      date: wrap.querySelector('.es_date').value,
      time: mkTime(wrap.querySelector('.es_h').value, wrap.querySelector('.es_mi').value),
      location: wrap.querySelector('.es_loc').value,
      capacity: wrap.querySelector('.es_cap').value,
      deadline: mkDeadline(wrap.querySelector('.es_dl_date').value, wrap.querySelector('.es_dl_h').value, wrap.querySelector('.es_dl_mi').value),
      note: wrap.querySelector('.es_note').value
    });
  });
  const nsAdd=board.querySelector('#ns_add');
  const expBtn=board.querySelector('#exportBtn');
  if(expBtn) expBtn.onclick=exportBackup;
  if(nsAdd) nsAdd.onclick=()=>{
    if(busy) return;
    const t=board.querySelector('#ns_title').value.trim();
    if(!t){ board.querySelector('#ns_title').focus(); return; }
    nsAdd.disabled=true; nsAdd.textContent='建立中…';
    addActivity({
      title:t, date:board.querySelector('#ns_date').value, time:mkTime(board.querySelector('#ns_h').value, board.querySelector('#ns_mi').value),
      location:board.querySelector('#ns_loc').value.trim(), capacity:board.querySelector('#ns_cap').value,
      deadline:mkDeadline(board.querySelector('#ns_dl_date').value, board.querySelector('#ns_dl_h').value, board.querySelector('#ns_dl_mi').value),
      note:board.querySelector('#ns_note').value.trim()
    });
  };
}

/* ============ 即時刷新（輪詢） ============
   管理場次期間暫停背景同步：避免正在填「新增/編輯場次」時被重繪清空。
   要看最新名單可手動按「↻ 重新整理」；關掉管理場次即自動恢復同步。 */
async function poll(){ if(document.visibilityState==='visible' && !busy && !adminMode) await refresh(); }
